stages:
  - build

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: registry.hellhero.icu:5000/hiflow-ble-mqtt:latest

image: docker:24

services:
  - docker:24-dind

before_script:
  - docker info
  - echo "$CI_REGISTRY_PASSWORD" | docker login registry.hellhero.icu:5000 -u "$CI_REGISTRY_USER" --password-stdin

build_image:
  stage: build
  script:
    - echo "Building multi-platform Docker image..."
    - docker buildx create --use --name mybuilder
    - docker buildx use mybuilder
    - docker buildx inspect --bootstrap
    - docker buildx build --platform linux/arm64,linux/amd64 -t $IMAGE_NAME --push .