name: Docker Image CI

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

env:
  REGISTRY: ghcr.io
  # Multi-Arch nur beim tatsächlichen Push bauen: ein Multi-Platform-Ergebnis
  # lässt sich nicht per --load in den lokalen Docker-Daemon laden, daher bei
  # PR-Builds (kein Push) nur amd64 bauen.
  # linux/arm/v7 bewusst ausgelassen: cryptography liefert dafür keine
  # PyPI-Wheels mehr, ein Source-Build würde Rust/Cargo im Image erfordern.
  PLATFORMS: linux/amd64,linux/arm64

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      # Auf PRs aus Forks steht kein Push-Recht am GITHUB_TOKEN zur Verfügung,
      # deshalb nur bei push-Events einloggen und pushen.
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for BLE image
      id: meta-ble
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}

    - name: Build and push BLE Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        platforms: ${{ github.event_name == 'push' && env.PLATFORMS || 'linux/amd64' }}
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta-ble.outputs.tags }}
        labels: ${{ steps.meta-ble.outputs.labels }}

    - name: Extract metadata for webui image
      id: meta-web
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}-web

    - name: Build and push webui Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.web
        platforms: ${{ github.event_name == 'push' && env.PLATFORMS || 'linux/amd64' }}
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta-web.outputs.tags }}
        labels: ${{ steps.meta-web.outputs.labels }}
