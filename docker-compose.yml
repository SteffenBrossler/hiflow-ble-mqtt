services:
  hiflow-ble:
    build: .
    restart: unless-stopped
    # BLE requires host network + privileged access to the Bluetooth adapter
    network_mode: host
    privileged: true
    volumes:
      - /var/run/dbus:/var/run/dbus  # BlueZ D-Bus socket
      - ./state:/app/state           # restart_bluetooth.state for the host watchdog
    env_file:
      - .env   # HIFLOW_* / MQTT_* — see .env.example
    environment:
      HIFLOW_STATE_DIR: "/app/state"  # flag file for the host watchdog, fixed internal path
  
  hiflow-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    # Only talks to the MQTT broker — no Bluetooth access needed.
    ports:
      - "8080:8080"
    env_file:
      - .env      